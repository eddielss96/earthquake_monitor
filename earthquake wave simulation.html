<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台灣有感地震震波模擬系統</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ───────────────────────────────────────── */
:root{
  --bg:#01080f; --panel:rgba(2,14,28,.92); --rim:rgba(0,220,255,.18);
  --accent:#00e5ff; --p:#29d9ff; --s:#ff4500; --surf:#ffc400;
  --epi:#ff1744; --green:#00ff88; --text:#6baecf; --bright:#d0ecff; --dim:#2a4a62;
  --orb:'Orbitron',sans-serif; --mono:'Share Tech Mono',monospace; --sans:'Noto Sans TC',sans-serif;
  --glow-c:0 0 8px rgba(0,229,255,.7),0 0 24px rgba(0,229,255,.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── Header ──────────────────────────────────────────────── */
header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:48px;
  background:linear-gradient(90deg,#010c18,#020f20,#010c18);
  border-bottom:1px solid var(--rim);position:relative;z-index:600;
}
.hdr-title{font-family:var(--orb);font-size:15px;font-weight:600;color:var(--accent);letter-spacing:3px;text-shadow:var(--glow-c);}
.hdr-right{display:flex;align-items:center;gap:20px;}
.hdr-chip{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:1px;}
#timerDisplay{font-family:var(--orb);font-size:26px;font-weight:900;color:var(--accent);letter-spacing:4px;text-shadow:var(--glow-c);min-width:120px;text-align:right;}

/* ── Main layout ─────────────────────────────────────────── */
.main{flex:1;display:flex;overflow:hidden;min-height:0;}

/* ── Left Panel ──────────────────────────────────────────── */
.left-panel{width:260px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--rim);display:flex;flex-direction:column;overflow:hidden;z-index:600;}
.lp-section{border-bottom:1px solid rgba(0,229,255,.08);padding:10px 12px;}
.lp-title{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
.eq-list{flex:1;overflow-y:auto;padding:6px 8px;scrollbar-width:thin;scrollbar-color:var(--dim) transparent;}
.eq-card{padding:8px 10px;margin-bottom:5px;border:1px solid var(--rim);border-radius:4px;cursor:pointer;transition:all .2s;background:rgba(0,180,255,.04);position:relative;}
.eq-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .2s;}
.eq-card:hover{border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.05);}
.eq-card:hover::before{background:var(--accent);}
.eq-card.active{border-color:var(--accent);background:rgba(0,229,255,.09);box-shadow:0 0 12px rgba(0,229,255,.15);}
.eq-card.active::before{background:var(--accent);box-shadow:var(--glow-c);}
.eq-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.eq-mag{font-family:var(--orb);font-size:17px;font-weight:600;padding:1px 6px;border-radius:2px;}
.eq-mag.m7{color:#ff1744;background:rgba(255,23,68,.15);} .eq-mag.m6{color:#ff6d00;background:rgba(255,109,0,.12);}
.eq-mag.m5{color:#ffab00;background:rgba(255,171,0,.12);} .eq-mag.m4{color:#76ff03;background:rgba(118,255,3,.1);}
.eq-mag.m3{color:var(--p);background:rgba(41,217,255,.1);}
.eq-time{font-family:var(--mono);font-size:11px;color:var(--dim);}
.eq-loc{font-size:12px;color:var(--text);margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.eq-row3{display:flex;gap:6px;}
.eq-badge{font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:2px;border:1px solid var(--rim);color:var(--dim);}
.slider-row{margin-bottom:8px;}
.slider-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:3px;}
.slider-lbl span{color:var(--bright);font-family:var(--mono);}
input[type=range]{width:100%;height:2px;appearance:none;background:linear-gradient(90deg,var(--accent),#0080ff);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:var(--glow-c);}
.btn-row{display:flex;gap:6px;margin-bottom:8px;}
.btn{flex:1;padding:6px;border:1px solid var(--rim);background:transparent;color:var(--accent);font-family:var(--mono);font-size:13px;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;}
.btn:hover{background:rgba(0,229,255,.1);border-color:var(--accent);}
.btn.active{background:var(--accent);color:#010c18;}
.btn-play{flex:2;}
.sta-item{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,229,255,.05);}
.sta-dot{width:7px;height:7px;border-radius:50%;margin-right:6px;flex-shrink:0;transition:background .3s;}
.sta-name{color:var(--text);font-size:12px;flex:1;}
.sta-times{font-family:var(--mono);font-size:11px;color:var(--dim);}
.sta-times span{color:var(--bright);}

/* ── Tile selector ───────────────────────────────────────── */
.tile-select{width:100%;padding:4px 6px;background:#020d1a;border:1px solid var(--rim);color:var(--text);font-family:var(--mono);font-size:12px;border-radius:2px;outline:none;cursor:pointer;}

/* ── Map container ───────────────────────────────────────── */
#mapWrap{flex:1;position:relative;min-height:0;min-width:0;}
#map{width:100%;height:100%;}

/* Leaflet overrides */
.leaflet-container{font-family:var(--sans);}
.leaflet-control-zoom a{background:#020d1a!important;color:var(--accent)!important;border-color:var(--rim)!important;}
.leaflet-control-zoom a:hover{background:rgba(0,229,255,.15)!important;}
.leaflet-control-attribution{background:rgba(2,14,28,.8)!important;color:var(--dim)!important;font-size:9px!important;}
.leaflet-control-attribution a{color:var(--text)!important;}
.leaflet-popup-content-wrapper{background:var(--panel);border:1px solid var(--rim);color:var(--bright);}
.leaflet-popup-tip{background:var(--panel);}

/* Epicenter marker */
.epi-icon-outer{
  width:28px;height:28px;border-radius:50%;
  border:2px solid rgba(255,23,68,.6);
  animation:ring-expand 1.5s ease-out infinite;
}
@keyframes ring-expand{0%{transform:scale(.5);opacity:.8}100%{transform:scale(2);opacity:0}}
.epi-icon{
  width:14px;height:14px;border-radius:50%;
  background:rgba(255,23,68,.9);border:2px solid #ff6b6b;
  box-shadow:0 0 10px #ff1744,0 0 20px rgba(255,23,68,.5);
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  animation:pulse-epi 1.2s ease-in-out infinite;
}
@keyframes pulse-epi{0%,100%{box-shadow:0 0 10px #ff1744,0 0 20px rgba(255,23,68,.5)}50%{box-shadow:0 0 18px #ff1744,0 0 36px rgba(255,23,68,.7)}}
.sta-dot-marker{
  width:10px;height:10px;border-radius:50%;
  background:white;border:2px solid var(--accent);
  box-shadow:0 0 6px rgba(0,229,255,.5);
  transition:background .3s,box-shadow .3s;
}
.sta-dot-marker.arrived-p{background:var(--p);border-color:var(--p);box-shadow:0 0 8px rgba(41,217,255,.7);}
.sta-dot-marker.arrived-s{background:var(--s);border-color:var(--s);box-shadow:0 0 8px rgba(255,69,0,.7);}

/* Map overlay HUD */
.map-hud{
  position:absolute;top:10px;right:10px;z-index:500;
  background:var(--panel);border:1px solid var(--rim);
  border-radius:4px;padding:10px 14px;backdrop-filter:blur(8px);min-width:160px;
}
.hud-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.hud-label{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
.hud-val{font-family:var(--orb);font-size:16px;color:var(--accent);}

/* Wave legend */
.wave-legend{
  position:absolute;bottom:24px;right:10px;z-index:500;
  background:var(--panel);border:1px solid var(--rim);
  border-radius:4px;padding:8px 12px;backdrop-filter:blur(8px);
}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;color:var(--text);}
.leg-line{width:24px;height:2px;border-radius:1px;flex-shrink:0;}

/* ── Seismograph strip ───────────────────────────────────── */
.seismo-strip{
  flex-shrink:0;height:130px;background:#020a14;
  border-top:1px solid var(--rim);display:flex;z-index:600;
}
.seismo-block{flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid rgba(0,229,255,.06);padding:4px 6px;}
.seismo-block:last-child{border-right:none;}
.seismo-label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:1px;margin-bottom:2px;display:flex;justify-content:space-between;}
.seismo-status{font-size:10px;font-family:var(--mono);color:var(--dim);}
.seismo-cv{flex:1;width:100%;border:1px solid rgba(0,229,255,.08);border-radius:2px;background:#010810;}
</style>
</head>
<body>

<header>
  <div class="hdr-title">▌ 台灣有感地震震波模擬系統</div>
  <div class="hdr-right">
    <span class="hdr-chip" id="eqInfo">點選左側地震開始模擬</span>
    <div id="timerDisplay">T+000s</div>
  </div>
</header>

<div class="main">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="lp-section" style="padding-bottom:0;">
      <div class="lp-title">▶ 有感地震報告 — 點選模擬</div>
    </div>
    <div class="eq-list" id="eqList"><div style="color:var(--dim);padding:10px;font-size:11px;">載入中…</div></div>

    <div class="lp-section">
      <div class="lp-title">⚙ 控制</div>
      <div class="btn-row">
        <button class="btn btn-play" id="btnPlay" onclick="togglePlay()">▶ 播放</button>
        <button class="btn" onclick="resetSim()">↺ 重設</button>
      </div>
      <div class="slider-row">
        <div class="slider-lbl">模擬速度<span id="spdVal">×5</span></div>
        <input type="range" id="sldSpd" min="1" max="30" value="5" step="1"
               oninput="simSpeed=+this.value;document.getElementById('spdVal').textContent='×'+simSpeed">
      </div>
      <div class="slider-row">
        <div class="slider-lbl">地圖樣式</div>
        <select class="tile-select" id="tileSelect" onchange="switchTile(this.value)">
          <option value="dark">🌑 深色（預設）</option>
          <option value="light">☀️ 淺色</option>
          <option value="osm">🗺️ OpenStreetMap</option>
          <option value="topo">🏔️ 地形圖</option>
          <option value="satellite">🛰️ 衛星影像</option>
          <option value="nlsc">📡 臺灣電子地圖</option>
        </select>
      </div>
    </div>

    <div class="lp-section" style="overflow-y:auto;flex-shrink:0;">
      <div class="lp-title">📡 各站抵達時間</div>
      <div id="stationList"></div>
    </div>
  </div>

  <!-- MAP -->
  <div id="mapWrap">
    <div id="map"></div>
    <div class="map-hud">
      <div class="hud-row"><span class="hud-label">規模</span><span class="hud-val" id="hudMag">—</span></div>
      <div class="hud-row"><span class="hud-label">深度</span><span class="hud-val" id="hudDepth">—</span></div>
      <div class="hud-row"><span class="hud-label">最大震度</span><span class="hud-val" style="color:var(--surf)" id="hudInt">—</span></div>
      <div class="hud-row" style="margin-bottom:0"><span class="hud-label">震央</span><span class="hud-val" style="font-size:9px" id="hudLoc">—</span></div>
    </div>
    <div class="wave-legend">
      <div class="leg-row"><div class="leg-line" style="background:var(--p)"></div>P 波 6.0 km/s</div>
      <div class="leg-row"><div class="leg-line" style="background:var(--s)"></div>S 波 3.5 km/s</div>
      <div class="leg-row"><div class="leg-line" style="background:var(--surf);height:0;border-top:2px dashed var(--surf);width:24px"></div>表面波 2.5 km/s</div>
    </div>
  </div>

</div>

<div class="seismo-strip" id="seismoStrip"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ══════════════════════════════════════════════
// EARTHQUAKE DATABASE
// ══════════════════════════════════════════════
/* __EQ_DB_PLACEHOLDER__ */
const PRESET_EQ = [
  {no:"24001",time:"2024-04-03 07:58:11",location:"花蓮縣近海",lat:23.82,lon:121.56,depth:15,mag:7.4,max_int:"6強",web:"https://scweb.cwa.gov.tw/zh-tw/earthquake/details/2024090"},
  {no:"22001",time:"2022-09-18 14:44:16",location:"台東縣池上鄉",lat:23.15,lon:121.20,depth:7,mag:6.8,max_int:"6強",web:""},
  {no:"18001",time:"2018-02-06 23:50:42",location:"花蓮縣近海",lat:24.14,lon:121.62,depth:11,mag:6.2,max_int:"6弱",web:""},
  {no:"06001",time:"2006-12-26 12:26:21",location:"屏東縣恆春鎮近海",lat:21.87,lon:120.55,depth:44,mag:7.0,max_int:"5強",web:""},
  {no:"99921",time:"1999-09-21 01:47:16",location:"南投縣集集鎮",lat:23.85,lon:120.82,depth:8,mag:7.3,max_int:"7級",web:""},
];
const EQ_DB = (typeof INJECTED_DB!=='undefined'&&INJECTED_DB&&INJECTED_DB.length>0)?INJECTED_DB:PRESET_EQ;

// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const P_SPD=6.0, S_SPD=3.5, SURF_SPD=2.5, SEISMO_WIN=120;
// ══════════════════════════════════════════════
// STATIONS
// SEISMO_STATIONS: 6 個代表站（地震儀顯示）
// MAP_STATIONS:    全台 22 縣市（地圖標記 + 抵達列表）
// ══════════════════════════════════════════════
const SEISMO_STATIONS = [
  ["台北","TPE",121.56,25.04],
  ["宜蘭","ILA",121.75,24.70],
  ["花蓮","HLN",121.61,23.97],
  ["台中","TCH",120.67,24.15],
  ["台南","TNN",120.20,22.99],
  ["高雄","KHH",120.31,22.63],
];
// 為了讓 seismograph 的程式碼仍使用 STATIONS 名稱：
const STATIONS = SEISMO_STATIONS;

const MAP_STATIONS = [
  // 北部
  ["基隆","KEE",121.74,25.13],
  ["台北","TPE",121.56,25.04],
  ["新北","NTP",121.45,25.01],
  ["桃園","TYN",121.30,24.99],
  ["新竹市","HCC",120.97,24.81],
  ["新竹縣","HCH",121.00,24.70],
  // 中部
  ["苗栗","MIA",120.82,24.56],
  ["台中","TCH",120.67,24.15],
  ["彰化","CHA",120.52,24.07],
  ["南投","NAN",120.99,23.96],
  ["雲林","YUN",120.39,23.71],
  // 南部
  ["嘉義市","CYC",120.45,23.47],
  ["嘉義縣","CYH",120.57,23.46],
  ["台南","TNN",120.20,22.99],
  ["高雄","KHH",120.31,22.63],
  ["屏東","PIG",120.49,22.67],
  // 東部
  ["台東","TTT",121.11,22.75],
  ["花蓮","HLN",121.61,23.97],
  ["宜蘭","ILA",121.75,24.70],
  // 直轄市補充
  ["基隆","KEE",121.74,25.13], // 已在北部，跳過重複
  // 離島
  ["澎湖","MZG",119.57,23.57],
  ["金門","KMN",118.32,24.43],
].filter((v,i,a)=>a.findIndex(x=>x[1]===v[1])===i); // 去重複

// ══════════════════════════════════════════════
// LEAFLET MAP
// ══════════════════════════════════════════════
const map = L.map('map',{center:[23.5,121.0],zoom:7,zoomControl:true,attributionControl:true});

const TILES = {
  dark:      ['https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png','&copy; OSM &copy; CARTO',{subdomains:'abcd',maxZoom:19}],
  light:     ['https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png','&copy; OSM &copy; CARTO',{subdomains:'abcd',maxZoom:19}],
  osm:       ['https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png','&copy; OpenStreetMap contributors',{subdomains:'abc',maxZoom:19}],
  topo:      ['https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png','&copy; OpenTopoMap',{subdomains:'abc',maxZoom:17}],
  satellite: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}','&copy; Esri',{maxZoom:18}],
  nlsc:      ['https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}','&copy; 國土測繪中心',{maxZoom:20}],
};
let currentTile = L.tileLayer(TILES.dark[0],{attribution:TILES.dark[1],...TILES.dark[2]}).addTo(map);

function switchTile(key){
  map.removeLayer(currentTile);
  const [url,attr,opts]=TILES[key];
  currentTile=L.tileLayer(url,{attribution:attr,...opts}).addTo(map);
}

// ══════════════════════════════════════════════
// WAVE CANVAS OVERLAY
// ══════════════════════════════════════════════
const mapWrap = document.getElementById('mapWrap');
const waveCanvas = document.createElement('canvas');
waveCanvas.style.cssText='position:absolute;top:0;left:0;pointer-events:none;z-index:400;';
mapWrap.appendChild(waveCanvas);
const wCtx = waveCanvas.getContext('2d');

function resizeWave(){
  waveCanvas.width  = mapWrap.clientWidth;
  waveCanvas.height = mapWrap.clientHeight;
}
resizeWave();
window.addEventListener('resize', resizeWave);
map.on('resize', resizeWave);

// Convert km distance to canvas pixels using Leaflet projection
function kmToPx(km){
  const latDeg = km/111;
  const p1 = map.latLngToContainerPoint([epicenter.lat, epicenter.lon]);
  const p2 = map.latLngToContainerPoint([epicenter.lat+latDeg, epicenter.lon]);
  return Math.abs(p1.y-p2.y);
}
function epiPx(){ return map.latLngToContainerPoint([epicenter.lat,epicenter.lon]); }

// ══════════════════════════════════════════════
// LEAFLET MARKERS
// ══════════════════════════════════════════════
let epiMarker = null;
const stationMarkers = [];

function buildEpiMarker(){
  if(epiMarker) map.removeLayer(epiMarker);
  const icon = L.divIcon({
    html:`<div class="epi-icon-outer"><div class="epi-icon"></div></div>`,
    className:'', iconSize:[28,28], iconAnchor:[14,14]
  });
  epiMarker = L.marker([epicenter.lat,epicenter.lon],{icon,zIndexOffset:1000})
    .addTo(map)
    .bindPopup(`<b>${epicenter.location}</b><br>M${epicenter.mag.toFixed(1)} 深${epicenter.depth}km`);
}

function buildStationMarkers(){
  stationMarkers.forEach(m=>map.removeLayer(m));
  stationMarkers.length=0;
  MAP_STATIONS.forEach(([name,code,lon,lat])=>{
    const icon=L.divIcon({html:`<div class="sta-dot-marker" id="sm-${code}"></div>`,className:'',iconSize:[10,10],iconAnchor:[5,5]});
    const m=L.marker([lat,lon],{icon}).addTo(map)
      .bindTooltip(name,{permanent:false,direction:'right',className:'leaflet-tooltip'});
    stationMarkers.push(m);
  });
}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let simTime=0, simSpeed=5, playing=false, lastTs=null;
let epicenter={lat:23.82,lon:121.56,depth:15,mag:7.4,location:'',max_int:'—',web:''};

// ══════════════════════════════════════════════
// PHYSICS
// ══════════════════════════════════════════════
function pNoise(t,s){return Math.sin(t*137.5+s*11)*.5+Math.sin(t*359.8+s*7)*.3+Math.sin(t*811.2+s*3)*.2;}
function groundMotion(t,dist,dep,mag,seed){
  const hypo=Math.sqrt(dist*dist+dep*dep);
  const pA=hypo/P_SPD,sA=hypo/S_SPD,suA=dist/SURF_SPD;
  const amp=Math.pow(10,.7*(mag-4.5))/Math.max(hypo*.05,1);
  let y=pNoise(t,seed)*.008*amp;
  if(t<pA) return y;
  const pDt=t-pA;y+=amp*.35*Math.exp(-pDt*.4)*Math.min(1,pDt*6)*Math.sin(2*Math.PI*pDt*2.2+pNoise(pDt,seed));
  if(t<sA) return y;
  const sDt=t-sA;y+=amp*1.1*Math.exp(-sDt*.18)*Math.min(1,sDt*4)*Math.sin(2*Math.PI*sDt*.75+pNoise(sDt,seed+1));
  if(t<suA||dist<30) return y;
  const suDt=t-suA;y+=amp*.7*Math.exp(-suDt*.06)*Math.min(1,suDt*2)*Math.sin(2*Math.PI*suDt*.25+pNoise(suDt,seed+2));
  return y;
}
function geoDist(lon1,lat1,lon2,lat2){
  const m=(lat1+lat2)*.5*Math.PI/180;
  return Math.sqrt(Math.pow((lon2-lon1)*111*Math.cos(m),2)+Math.pow((lat2-lat1)*111,2));
}

// ══════════════════════════════════════════════
// DRAW WAVE OVERLAY
// ══════════════════════════════════════════════
function drawRing(distKm,color,dashed,label){
  if(distKm<0.5) return;
  const r=kmToPx(distKm);
  const {x,y}=epiPx();
  const fade=Math.max(0,1-distKm/2500);
  if(fade<=0) return;
  wCtx.save();
  wCtx.globalAlpha=fade*.9;
  wCtx.strokeStyle=color;
  if(dashed) wCtx.setLineDash([6,5]); else wCtx.setLineDash([]);
  // Glow pass
  wCtx.shadowColor=color; wCtx.shadowBlur=14; wCtx.lineWidth=3; wCtx.globalAlpha=fade*.15;
  wCtx.beginPath(); wCtx.arc(x,y,r,0,Math.PI*2); wCtx.stroke();
  // Crisp pass
  wCtx.shadowBlur=0; wCtx.lineWidth=1.5; wCtx.globalAlpha=fade*.9;
  wCtx.beginPath(); wCtx.arc(x,y,r,0,Math.PI*2); wCtx.stroke();
  wCtx.setLineDash([]);
  // Label
  if(r>20&&r<waveCanvas.width*.9){
    wCtx.font='bold 9px Share Tech Mono';
    wCtx.fillStyle=color;wCtx.globalAlpha=fade*.8;
    wCtx.fillText(label,x-wCtx.measureText(label).width/2,y-r-4);
  }
  wCtx.restore();
}

function drawIntensity(){
  const dist=S_SPD*simTime; if(dist<0.5) return;
  const r=kmToPx(dist); if(r<2) return;
  const {x,y}=epiPx();
  const a=Math.min(1,(epicenter.mag-3)/4);
  const g=wCtx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,`rgba(255,23,68,${.35*a})`);
  g.addColorStop(.2,`rgba(255,100,10,${.22*a})`);
  g.addColorStop(.5,`rgba(255,200,0,${.1*a})`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  wCtx.save(); wCtx.globalCompositeOperation='screen';
  wCtx.fillStyle=g; wCtx.beginPath(); wCtx.arc(x,y,r,0,Math.PI*2); wCtx.fill();
  wCtx.restore();
}

function drawWaveFrame(){
  wCtx.clearRect(0,0,waveCanvas.width,waveCanvas.height);
  drawIntensity();
  drawRing(SURF_SPD*simTime,'#ffc400',true,'表面波');
  drawRing(S_SPD*simTime,   '#ff4500',false,'S波');
  drawRing(P_SPD*simTime,   '#29d9ff',false,'P波');
}

// Update station marker colors based on wave arrival
function updateStationDots(){
  // Map markers: all 22 counties
  MAP_STATIONS.forEach(([name,code,lon,lat])=>{
    const dist=geoDist(epicenter.lon,epicenter.lat,lon,lat);
    const hypo=Math.sqrt(dist*dist+epicenter.depth*epicenter.depth);
    const hasP=simTime>=hypo/P_SPD, hasS=simTime>=hypo/S_SPD;
    const el=document.getElementById(`sm-${code}`);
    if(el) el.className='sta-dot-marker'+(hasS?' arrived-s':hasP?' arrived-p':'');
  });
  // Seismograph status: only SEISMO_STATIONS
  SEISMO_STATIONS.forEach(([name,code,lon,lat],i)=>{
    const dist=geoDist(epicenter.lon,epicenter.lat,lon,lat);
    const hypo=Math.sqrt(dist*dist+epicenter.depth*epicenter.depth);
    const hasP=simTime>=hypo/P_SPD, hasS=simTime>=hypo/S_SPD;
    if(seismoStatuses[i]){
      if(hasS){seismoStatuses[i].textContent='S波到達';seismoStatuses[i].style.color='var(--s)';}
      else if(hasP){seismoStatuses[i].textContent='P波到達';seismoStatuses[i].style.color='var(--p)';}
      else{seismoStatuses[i].textContent='待機';seismoStatuses[i].style.color='var(--dim)';}
    }
  });
}

// ══════════════════════════════════════════════
// SEISMOGRAPH
// ══════════════════════════════════════════════
const seismoCanvases=[],seismoCtxs=[],seismoStatuses=[];
const strip=document.getElementById('seismoStrip');
STATIONS.forEach(([name,code])=>{
  const blk=document.createElement('div'); blk.className='seismo-block';
  const lbl=document.createElement('div'); lbl.className='seismo-label';
  const st=document.createElement('span'); st.className='seismo-status'; st.textContent='待機';
  lbl.textContent=`${name} ${code}`; lbl.appendChild(st);
  const cv=document.createElement('canvas'); cv.className='seismo-cv';
  blk.appendChild(lbl); blk.appendChild(cv); strip.appendChild(blk);
  seismoCanvases.push(cv); seismoCtxs.push(cv.getContext('2d')); seismoStatuses.push(st);
});

function drawSeismo(ctx,cv,idx){
  const W=cv.offsetWidth||120, H=cv.offsetHeight||70;
  cv.width=W; cv.height=H;
  const [,,sLon,sLat]=STATIONS[idx];
  const dist=geoDist(epicenter.lon,epicenter.lat,sLon,sLat);
  const seed=idx*7.3, midY=H/2, maxA=H*.38;
  const hypo=Math.sqrt(dist*dist+epicenter.depth*epicenter.depth);
  const pArr=hypo/P_SPD, sArr=hypo/S_SPD, suArr=dist/SURF_SPD;
  const tStart=Math.max(0,simTime-SEISMO_WIN);
  const tToX=t=>Math.max(0,(t-tStart)/SEISMO_WIN*W);

  ctx.fillStyle='#010810'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,229,255,.05)'; ctx.lineWidth=.4; ctx.setLineDash([1,4]);
  [.25,.5,.75].forEach(f=>{ctx.beginPath();ctx.moveTo(0,H*f);ctx.lineTo(W,H*f);ctx.stroke();});
  ctx.setLineDash([]);

  [[pArr,'var(--p)','P'],[sArr,'var(--s)','S'],[suArr,'var(--surf)','R']].forEach(([arr,col,lbl])=>{
    const x=tToX(arr); if(x<=0||x>W) return;
    ctx.save();ctx.strokeStyle=col;ctx.globalAlpha=.5;ctx.lineWidth=1;ctx.setLineDash([2,3]);
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
    ctx.setLineDash([]);ctx.fillStyle=col;ctx.globalAlpha=.8;ctx.font='7px Share Tech Mono';ctx.fillText(lbl,x+2,8);ctx.restore();
  });

  ctx.beginPath(); let first=true;
  for(let px=0;px<=W;px++){
    const t=tStart+px/W*SEISMO_WIN; if(t>simTime) break;
    const d=groundMotion(t,dist,epicenter.depth,epicenter.mag,seed);
    const y=midY-Math.max(-maxA,Math.min(maxA,d*maxA*.55));
    if(first){ctx.moveTo(px,y);first=false;}else ctx.lineTo(px,y);
  }
  ctx.strokeStyle='#00ff88';ctx.lineWidth=1;ctx.shadowColor='#00ff88';ctx.shadowBlur=4;ctx.stroke();
  ctx.shadowBlur=0;
}

// ══════════════════════════════════════════════
// EARTHQUAKE SELECTOR
// ══════════════════════════════════════════════
function magClass(m){if(m>=7)return 'm7';if(m>=6)return 'm6';if(m>=5)return 'm5';if(m>=4)return 'm4';return 'm3';}
const eqListEl=document.getElementById('eqList');
eqListEl.innerHTML='';
EQ_DB.forEach((eq,i)=>{
  const card=document.createElement('div');card.className='eq-card'+(i===0?' active':'');
  card.innerHTML=`<div class="eq-row1"><span class="eq-mag ${magClass(eq.mag)}">M${parseFloat(eq.mag).toFixed(1)}</span><span class="eq-time">${eq.time.slice(0,16)}</span></div><div class="eq-loc">${eq.location}</div><div class="eq-row3"><span class="eq-badge">深度 ${eq.depth}km</span><span class="eq-badge">震度 ${eq.max_int||'—'}</span></div>`;
  card.onclick=()=>selectEq(eq,card);
  eqListEl.appendChild(card);
});

function selectEq(eq,cardEl,autoPlay=true){
  document.querySelectorAll('.eq-card').forEach(c=>c.classList.remove('active'));
  if(cardEl) cardEl.classList.add('active');
  epicenter={lat:+eq.lat,lon:+eq.lon,depth:+eq.depth||10,mag:+eq.mag||4,location:eq.location||'',max_int:eq.max_int||'—',web:eq.web||''};
  resetSim();
  buildEpiMarker();
  map.flyTo([epicenter.lat,epicenter.lon],7,{duration:1});
  updateHUD(); updateStationList();
  document.getElementById('eqInfo').textContent=`${eq.location} M${parseFloat(eq.mag).toFixed(1)}`;
  if(autoPlay){playing=true;lastTs=null;document.getElementById('btnPlay').textContent='⏸ 暫停';document.getElementById('btnPlay').classList.add('active');}
}

function updateHUD(){
  document.getElementById('hudMag').textContent='M '+epicenter.mag.toFixed(1);
  document.getElementById('hudDepth').textContent=epicenter.depth+' km';
  document.getElementById('hudInt').textContent=epicenter.max_int;
  document.getElementById('hudLoc').textContent=(epicenter.location||'').slice(0,18)||'—';
}
function updateStationList(){
  // Show all 22 counties in left panel
  document.getElementById('stationList').innerHTML=MAP_STATIONS.map(([name,code,lon,lat])=>{
    const d=geoDist(epicenter.lon,epicenter.lat,lon,lat);
    const h=Math.sqrt(d*d+epicenter.depth*epicenter.depth);
    return `<div class="sta-item"><div class="sta-dot" style="background:var(--p)" id="dot-${code}"></div><div class="sta-name">${name}</div><div class="sta-times">P:<span>${(h/P_SPD).toFixed(0)}s</span> S:<span>${(h/S_SPD).toFixed(0)}s</span></div></div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════
function togglePlay(){
  playing=!playing;lastTs=null;
  const btn=document.getElementById('btnPlay');
  btn.textContent=playing?'⏸ 暫停':'▶ 播放';btn.classList.toggle('active',playing);
}
function resetSim(){
  simTime=0;lastTs=null;playing=false;
  document.getElementById('btnPlay').textContent='▶ 播放';
  document.getElementById('btnPlay').classList.remove('active');
}

// ══════════════════════════════════════════════
// ANIMATION LOOP
// ══════════════════════════════════════════════
function frame(ts){
  if(playing){if(lastTs!==null)simTime+=((ts-lastTs)/1000)*simSpeed;lastTs=ts;}
  drawWaveFrame();
  updateStationDots();
  seismoCanvases.forEach((cv,i)=>drawSeismo(seismoCtxs[i],cv,i));
  document.getElementById('timerDisplay').textContent='T+'+simTime.toFixed(0).padStart(3,'0')+'s';
  requestAnimationFrame(frame);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
buildStationMarkers();
if(EQ_DB.length>0) selectEq(EQ_DB[0],eqListEl.firstChild,false);
map.whenReady(()=>{setTimeout(()=>map.invalidateSize(),100);});
requestAnimationFrame(frame);
</script>
