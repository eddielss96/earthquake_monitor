<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes" />
  <title>台灣地震資料統計面板</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.80.5/build/style.css" />
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.80.5/build/stlite.js"
    
    mount(
      {
        // 1. 指定你的地震面板需要的第三方 Python 套件
        // (註：urllib3, zipfile, xml 屬於 Python 內建標準庫，不需寫在這裡)
        requirements: ["pandas", "plotly", "requests"], 
        
        // 2. 設定專案的啟動檔案名稱 [cite: 384]
        entrypoint: "earthquake_app.py", 
        
        // 3. 對應你的 GitHub 儲存庫中的檔案路徑 [cite: 385-387]
        files: {
          "earthquake_app.py": {
            url: "./earthquake_app.py"
          }
        }
      },
      document.getElementById("root")
    )
  </script>
</body>
</html>
